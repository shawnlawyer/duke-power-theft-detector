services:
  power-detector:
    build:
      context: ../..
    image: home-energy-watch:latest
    ports:
      - "${POWER_WEB_PORT:-80}:8000"
    environment:
      POWER_DATABASE_URL: ${POWER_DATABASE_URL}
      POWER_ENV: ${POWER_ENV:-production}
      POWER_APP_SECRET: ${POWER_APP_SECRET}
      POWER_AUDIT_SIGNING_KEY: ${POWER_AUDIT_SIGNING_KEY}
      POWER_DATA_ENCRYPTION_KEY: ${POWER_DATA_ENCRYPTION_KEY}
      POWER_PUBLIC_BASE_URL: ${POWER_PUBLIC_BASE_URL}
      POWER_MARKETING_BASE_URL: ${POWER_MARKETING_BASE_URL:-}
      POWER_TRUST_PROXY: ${POWER_TRUST_PROXY:-true}
      POWER_STAFF_MFA_REQUIRED: ${POWER_STAFF_MFA_REQUIRED:-false}
      POWER_EMAIL_BACKEND: ${POWER_EMAIL_BACKEND:-ses}
      POWER_EMAIL_FROM: ${POWER_EMAIL_FROM}
      POWER_EMAIL_REPLY_TO: ${POWER_EMAIL_REPLY_TO:-}
      POWER_EMAIL_REGION: ${POWER_EMAIL_REGION:-us-east-1}
      POWER_BILLING_ENABLED: ${POWER_BILLING_ENABLED:-false}
      STRIPE_ACCOUNT_ID: ${STRIPE_ACCOUNT_ID:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_API_VERSION: ${STRIPE_API_VERSION:-2026-02-25.clover}
      STRIPE_PRICE_HOME: ${STRIPE_PRICE_HOME:-}
      STRIPE_PRICE_REVIEW: ${STRIPE_PRICE_REVIEW:-}
      POWER_INPUT_DIR: /srv/home-energy-watch/input
      POWER_OUTPUT_DIR: /srv/home-energy-watch/output
      POWER_TIMEZONE: ${POWER_TIMEZONE:-America/New_York}
      POWER_NIGHT_START: ${POWER_NIGHT_START:-02:00}
      POWER_NIGHT_END: ${POWER_NIGHT_END:-04:00}
      POWER_MIN_NIGHT_KW: ${POWER_MIN_NIGHT_KW:-1.0}
      POWER_NIGHT_MULTIPLIER: ${POWER_NIGHT_MULTIPLIER:-2.0}
      POWER_ALERT_WINDOW_START: ${POWER_ALERT_WINDOW_START:-00:00}
      POWER_ALERT_WINDOW_END: ${POWER_ALERT_WINDOW_END:-05:00}
      POWER_ALERT_MIN_KW: ${POWER_ALERT_MIN_KW:-1.2}
      POWER_ALERT_MULTIPLIER: ${POWER_ALERT_MULTIPLIER:-1.5}
      POWER_ALERT_JUMP_KW: ${POWER_ALERT_JUMP_KW:-0.75}
      POWER_WEB_CONCURRENCY: ${POWER_WEB_CONCURRENCY:-3}
      POWER_GUNICORN_TIMEOUT: ${POWER_GUNICORN_TIMEOUT:-120}
    volumes:
      - /opt/home-energy-watch/input:/srv/home-energy-watch/input
      - /opt/home-energy-watch/output:/srv/home-energy-watch/output
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped
