name: Release security gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out reviewed source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - name: Test and scan the release image
        run: ./scripts/security-scan.sh
