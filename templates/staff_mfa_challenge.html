{% extends "base.html" %}

{% block content %}
  <main class="app-layout auth-layout">
    <section class="section-block auth-block">
      <div class="section-header">
        <div>
          <p class="section-kicker">Commission security</p>
          <h2>Verify your sign-in.</h2>
          <p class="plain-note">Enter the current code from your authenticator app, or use one recovery code for {{ staff_email }}.</p>
        </div>
      </div>

      <form class="account-form" action="{{ url_for('staff_mfa_challenge_post') }}" method="post">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <label>
          <span>Authenticator or recovery code</span>
          <input type="text" name="code" autocomplete="one-time-code" autocapitalize="characters" spellcheck="false" required autofocus>
        </label>
        <button type="submit">Verify sign-in</button>
      </form>
      <p class="plain-note auth-note">
        <a class="inline-link" href="{{ url_for('login') }}">Return to sign in</a>
      </p>
    </section>
  </main>
{% endblock %}
