{% extends "base.html" %}

{% block content %}
  <main class="app-layout auth-layout">
    <section class="section-block auth-block">
      <div class="section-header">
        <div>
          <p class="section-kicker">Home account</p>
          <h2>Start watching your energy history.</h2>
          <p class="plain-note">Create an account, add your electric account number, and upload your first usage file when you are ready.</p>
        </div>
      </div>

      <form class="account-form" action="{{ url_for('customer_signup_post') }}" method="post">
        <div class="pricing-grid signup-pricing">
          {% for plan in billing_plans %}
            <label class="plan-card choice-card">
              <input
                type="radio"
                name="plan_id"
                value="{{ plan.id }}"
                {% if plan.id == selected_plan_id %}checked{% endif %}
              >
              <span>{{ plan.monthly_price_label }}</span>
              <strong>{{ plan.name }}</strong>
              <small>{{ plan.summary }}</small>
            </label>
          {% endfor %}
        </div>

        <div class="field-grid">
          <label>
            <span>Name</span>
            <input type="text" name="full_name" required>
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" required>
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" required>
          </label>
          <label>
            <span>Electric account number</span>
            <input type="text" name="account_number" required>
          </label>
          <label>
            <span>Energy company</span>
            <select name="energy_company" required>
              <option value="">Choose provider</option>
              {% for group in energy_company_groups %}
                <optgroup label="{{ group.label }}">
                  {% for company in group.companies %}
                    <option value="{{ company }}">{{ company }}</option>
                  {% endfor %}
                </optgroup>
              {% endfor %}
            </select>
          </label>
          <label>
            <span>Address</span>
            <input type="text" name="address" placeholder="Street, city, state">
          </label>
        </div>
        <button type="submit">Create account</button>
      </form>

      <p class="plain-note auth-note">
        Already started? <a class="inline-link" href="{{ url_for('customer_login') }}">Sign in</a>.
      </p>
    </section>
  </main>
{% endblock %}
