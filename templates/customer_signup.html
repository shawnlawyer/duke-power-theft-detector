{% extends "base.html" %}

{% block content %}
  <main class="app-layout auth-layout signup-layout">
    <section class="section-block auth-block">
      <div class="section-header">
        <div>
          <p class="section-kicker">Home account</p>
          <h2>Start watching your energy history.</h2>
          <p class="plain-note">Create an account, choose the workspace that fits, and add your first usage file when you are ready.</p>
        </div>
      </div>

      <form
        class="account-form"
        action="{{ url_for('customer_signup_post') }}"
        method="post"
        data-utility-lookup
        data-utility-url="{{ url_for('utility_lookup_api') }}"
      >
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="pricing-grid signup-pricing">
          {% for plan in billing_plans %}
            <label class="plan-card choice-card">
              <input
                type="radio"
                name="plan_id"
                value="{{ plan.id }}"
                {% if plan.id == selected_plan_id %}checked{% endif %}
              >
              <span>{{ plan.monthly_price_label }}</span>
              <strong>{{ plan.name }}</strong>
              <small>{{ plan.summary }}</small>
            </label>
          {% endfor %}
        </div>

        <div class="field-grid">
          <label>
            <span>Name</span>
            <input type="text" name="full_name" value="{{ signup_form.full_name }}" required>
          </label>
          <label>
            <span>Email</span>
            <input type="email" name="email" value="{{ signup_form.email }}" required>
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" autocomplete="new-password" required>
          </label>
          <label>
            <span>Electric account number</span>
            <input type="text" name="account_number" value="{{ signup_form.account_number }}" required>
          </label>
          <label>
            <span>Service ZIP code</span>
            <input type="text" name="zip_code" value="{{ signup_form.zip_code }}" inputmode="numeric" autocomplete="postal-code" pattern="[0-9]{5}(-[0-9]{4})?" maxlength="10" data-utility-zip required>
          </label>
          <label class="wide-field">
            <span>Service address</span>
            <input type="text" name="address" value="{{ signup_form.address }}" placeholder="Street, city, state" autocomplete="street-address" data-utility-address required>
          </label>
          <label>
            <span>Your electric company</span>
            <output class="utility-match" data-utility-match aria-live="polite">
              Enter the service ZIP code and address.
            </output>
            <small>We match it to the service area for this address.</small>
          </label>
          <div class="consent-row wide-field">
            <input
              id="accept-policies"
              type="checkbox"
              name="accept_policies"
              value="yes"
              {% if signup_form.accept_policies %}checked{% endif %}
              required
            >
            <label for="accept-policies">
              I agree to the
              <a class="inline-link" href="{{ url_for('terms_page') }}" target="_blank" rel="noopener">Terms</a>
              and
              <a class="inline-link" href="{{ url_for('privacy_page') }}" target="_blank" rel="noopener">Privacy Notice</a>.
            </label>
          </div>
          <div class="consent-row wide-field">
            <input
              id="confirm-account-authority"
              type="checkbox"
              name="confirm_account_authority"
              value="yes"
              {% if signup_form.confirm_account_authority %}checked{% endif %}
              required
            >
            <label for="confirm-account-authority">
              I confirm that I am the account holder or have permission to manage this electric account and its usage history.
            </label>
          </div>
        </div>
        <button type="submit">Create account and continue to payment</button>
      </form>

      <p class="plain-note auth-note">
        Already started? <a class="inline-link" href="{{ url_for('customer_login') }}">Sign in</a>.
      </p>
    </section>
  </main>
{% endblock %}
