{% extends "base.html" %}

{% block content %}
  <main class="app-layout auth-layout">
    <section class="section-block auth-block">
      <div class="section-header">
        <div>
          <p class="section-kicker">Home sign in</p>
          <h2>Open your energy history.</h2>
          <p class="plain-note">Use the email tied to your electric account review.</p>
        </div>
      </div>

      <form class="account-form" action="{{ url_for('customer_login_post') }}" method="post">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="next" value="{{ next_url or '' }}">
        <label>
          <span>Email</span>
          <input type="email" name="email" required>
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" required>
        </label>
        <button type="submit">Sign in</button>
      </form>

      <p class="plain-note auth-note">
        New here? <a class="inline-link" href="{{ url_for('customer_signup') }}">Create an account</a>.
      </p>
      <p class="plain-note auth-note">
        <a class="inline-link" href="{{ url_for('customer_forgot_password') }}">Forgot your password?</a>
      </p>
    </section>
  </main>
{% endblock %}
